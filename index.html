<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <div id="loginForm">
        <h2>Login</h2>
        <form id="login">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
        <div id="loginMessage"></div>
    </div>

    <div id="adminDashboard" style="display:none;">
        <h2>Admin Dashboard</h2>
        <h3>Manage Students</h3>
        <form id="studentForm">
            <input type="text" id="studentName" name="studentName" placeholder="Student Name" required>
            <button type="submit">Add Student</button>
        </form>
        <h3>Manage Events</h3>
        <form id="eventForm">
            <input type="text" id="eventName" name="eventName" placeholder="Event Name" required>
            <button type="submit">Add Event</button>
        </form>
    </div>

    <script>
        $(document).ready(function() {
            $('#login').on('submit', function(e) {
                e.preventDefault();
                const username = $('#username').val();
                const password = $('#password').val();
                $.post('/api/login', { username, password })
                .done(function(data) {
                    localStorage.setItem('token', data.token);
                    $('#loginForm').hide();
                    $('#adminDashboard').show();
                })
                .fail(function() {
                    $('#loginMessage').text('Login failed. Please try again.');
                });
            });

            $('#studentForm').on('submit', function(e) {
                e.preventDefault();
                const studentName = $('#studentName').val();
                // Add Student Logic
            });

            $('#eventForm').on('submit', function(e) {
                e.preventDefault();
                const eventName = $('#eventName').val();
                // Add Event Logic
            });
        });
    </script>
</body>
</html>
